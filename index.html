    <title>Johan Magnusson</title>
    <meta charset="utf-8" />

      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <style>
      .terra-link:hover {
        color: #aa5031;
        fill: #aa5031;
        cursor: pointer;
      }
      .terra {
        color: #7a1f00;
        fill: #7a1f00;
      }
    </style>
  </head>
  <body class="h-screen" style="font-family: 'Poppins', sans-serif">

        x-transition:enter.opacity.duration.750ms
        class="box-content flex flex-col flex-1 relative"
      >
        <object class="w-full h-full" data="art.html"></object>
      </div>

      <div

        x-transition:enter.opacity.duration.750ms
        class="box-content flex flex-col flex-1 relative"
