<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .terra-link:hover {
        color: #aa5031;
        fill: #aa5031;
        cursor: pointer;
      }
      .terra {
        color: #7a1f00;
        fill: #7a1f00;
      }
    </style>
  </head>
  <body
    class="h-full overflow-auto relative"
    style="font-family: 'Poppins', sans-serif"
  >
    <div>
      <div class="w-full max-h-96 relative overflow-hidden flex justify-center">
        <div
          class="h-full max-h-96 bg-slate-100 border-2 border-gray-700 overflow-hidden relative"
        >
          <div
            class="absolute uppercase bottom-0 px-4 py-2 w-full bg-white opacity-80"
          >
            <a
              class="terra-link"
              href="https://www.galleriekdahl.se/"
              target="_blank"
            >
              <h1 class="text-3xl md:text-5xl transition-[font-size]">
                Galleri Ekdahl
              </h1>
              <h3 class="text-md md:text-2xl px-2">28 jan - 12 feb</h3>
            </a>
          </div>
          <img class="" src="assets/hero.png" alt="Current Exhibition" />
        </div>
      </div>
    </div>
  </body>
</html>
